manifest_version = 1
name = "v-search"
version = "1.0.0"
description = "Concurrent semantic search across grounding, Grok, Tavily, and Kimi Search backends, with optional synthesis into a research-style result."
author = "Skye"
plugin_type = "sync"

[entry_point]
command = "node"
args = ["v_search.js"]

[communication]
timeout_ms = 300000

[[capabilities.tools]]
name = "v_search_research"
description = "Run concurrent semantic search for a topic across one backend mode, optionally showing source URLs."
parameters = { type = "object", properties = { SearchTopic = { type = "string", description = "Research topic or framing context." }, Keywords = { type = "string", description = "Comma-separated or newline-separated keywords." }, SearchMode = { type = "string", description = "grounding, grok, tavily, or kimisearch." }, ShowURL = { type = "boolean", description = "Whether to include full source URLs in the synthesized result." } }, required = ["SearchTopic", "Keywords"], additionalProperties = false }
