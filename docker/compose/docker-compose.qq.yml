# QQ (OneBot v11) profile — overlay on docker-compose.yml.
#
# Usage:
#   cd docker/compose
#   docker compose -f docker-compose.yml -f docker-compose.qq.yml \
#       --profile qq up -d
#
# Services:
#   napcat   — NapCat QQ client: OneBot v11 forward-WS on the compose
#              network, webui + scan-login HTTP API on localhost:6099.
#   corlinman — (override) points at the in-network NapCat so the admin
#              scan-login flow + channel message bus both work without
#              any host-machine config.

services:
  napcat:
    # Community-maintained NapCat docker image (MLikiowa). Pinned to a
    # concrete known-good stable tag (NapCat v4.18.4, 2026-05-22) instead
    # of `latest` (which tracks the edge channel and can break prod on a
    # silent upstream bump). Override with NAPCAT_VERSION in .env to roll
    # forward/back — keep it matched to the native AppImage pin in
    # deploy/install.sh.
    image: mlikiowa/napcat-docker:${NAPCAT_VERSION:-v4.18.4}
    container_name: corlinman-napcat
    profiles: ["qq"]
    restart: unless-stopped
    ports:
      # 6099: NapCat webui + HTTP login API bound to localhost only.
      #       (consumed by POST /admin/channels/qq/qrcode and friends).
      - "127.0.0.1:6099:6099"
    expose:
      # 3001: OneBot v11 forward-WS, consumed inside corlinman-net only.
      - "3001"
    environment:
      NAPCAT_UID: "1000"
      NAPCAT_GID: "1000"
      # Leave QQ_ACCOUNT unset — users sign in via the admin UI scan flow.
    volumes:
      # Authoritative NapCat state: QQ session, WebUI users, OneBot config.
      # Persist across container recreations so users don't re-scan every
      # redeploy.
      - ../../.napcat/app:/app/napcat
      - ../../.napcat/ntqq:/app/.config/QQ
    networks:
      - corlinman-net

  corlinman:
    environment:
      # Admin REST scan-login flow dials NapCat webui here.
      CORLINMAN_NAPCAT_URL: http://napcat:6099
      # OneBot v11 forward-WS bridge for the channel dispatcher.
      # nosemgrep: javascript.lang.security.detect-insecure-websocket.detect-insecure-websocket -- internal compose-only OneBot bridge on corlinman-net; use wss:// when crossing hosts.
      QQ_WS_URL: ws://napcat:3001
    depends_on:
      - napcat
