# Main corlinman compose file.
# Usage:
#   cd docker/compose
#   docker compose up -d                          # main only
#   docker compose -f docker-compose.yml -f docker-compose.sandbox.yml up -d
#                                                   # enable Docker-backed plugin sandboxing
#   docker compose -f docker-compose.yml -f docker-compose.qq.yml --profile qq up -d
#   docker compose -f docker-compose.yml -f docker-compose.obs.yml --profile obs up -d

services:
  corlinman:
    # CORLINMAN_TAG selects the GHCR tag at runtime (defaults to `latest`).
    # Set to `local` after a local `docker buildx build -t corlinman:local`
    # to skip GHCR entirely; the build: block below still works as a
    # fallback when `docker compose pull` 404s.
    image: ghcr.io/ymylive/corlinman:${CORLINMAN_TAG:-latest}
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: corlinman
    restart: unless-stopped
    ports:
      - "6005:6005"
    env_file:
      - path: ../../.env
        required: false
    environment:
      BIND: 0.0.0.0
      CORLINMAN_PY_ADDR: 127.0.0.1:50051
      CORLINMAN_DATA_DIR: /data
      # Without this, admin UI toggle-save fails with `config_path_unset`
      # — the gateway can dry-run but can't persist mutations back to disk.
      CORLINMAN_CONFIG: /data/config.toml
      CORLINMAN_UI_DIR: /app/ui-static
      # Runtime-mode signal read by gateway/lifecycle/entrypoint.py (W1.3)
      # to pick the right UpgraderProtocol impl. The native systemd unit
      # sets CORLINMAN_RUNTIME_MODE=native via `Environment=`; the docker
      # path sets it here.
      CORLINMAN_RUNTIME_MODE: docker
    volumes:
      # Data directory (config.toml / plugins/ / agents/ / knowledge/ / vector/ / logs/)
      - ~/.corlinman:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - corlinman-net

networks:
  corlinman-net:
    driver: bridge
