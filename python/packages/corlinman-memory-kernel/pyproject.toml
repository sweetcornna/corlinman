[project]
name = "corlinman-memory-kernel"
version = "0.1.0"
description = "Unified memory kernel — scoped bi-temporal fact store (mk_* tables), turn-observation ingest queue, and ranked recall over memory.sqlite."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "aiosqlite>=0.20",
    # Golden-eval harness (evals.py) loads YAML-scripted recall cases.
    "pyyaml>=6",
]

[project.scripts]
corlinman-memory-evals = "corlinman_memory_kernel.evals:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_memory_kernel"]
