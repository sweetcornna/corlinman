# W6 affect lens: mood-congruent recall WITH the anti-spiral guard.
# Two equally-relevant memories, opposite valence, affect-stamped.
# - Mildly negative mood: congruence favors the sad memory (top_k=1).
# - DEEPLY negative mood (e ≤ -0.6): the mood-repair bias mirrors the
#   mood positive, so the POSITIVE memory wins instead — a sad persona
#   must not spiral into recalling only sadness.
# - Affect weight 0: classic ranking, both reachable (regression guard
#   that the lens stays strictly opt-in).
name: mood-congruence-and-repair
description: Affect lens ranks by mood congruence but repairs deep negative moods.
items:
  - scope_user: u1
    text: "yesterday was a sad terrible day at work"
    kind: event
    affect: [-0.8, -0.2, 0.3, 0.8]   # strongly negative valence
  - scope_user: u1
    text: "yesterday the work demo went wonderfully"
    kind: event
    affect: [0.8, 0.4, 0.5, 0.8]     # strongly positive valence
probes:
  # Mild sadness → mood congruence surfaces the sad memory first.
  - text: "yesterday work"
    scope_user: u1
    top_k: 1
    mood: [-0.4, 0.0, 0.0]
    affect_weight: 1.5
    expect: ["sad terrible"]
    forbid: ["wonderfully"]
  # Deep sadness → mood repair flips the bias to the positive memory.
  - text: "yesterday work"
    scope_user: u1
    top_k: 1
    mood: [-0.9, 0.0, 0.0]
    affect_weight: 1.5
    expect: ["wonderfully"]
    forbid: ["sad terrible"]
  # Lens off → classic ranking keeps both reachable.
  - text: "yesterday work"
    scope_user: u1
    expect: ["sad terrible", "wonderfully"]
