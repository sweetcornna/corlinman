[project]
name = "corlinman-server"
version = "1.8.12"
description = "grpc.aio server entrypoint for the corlinman Python AI plane."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = [
    "grpcio>=1.67",
    "structlog>=25.1",
    "python-json-logger>=3.2",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp>=1.27",
    "aiosqlite>=0.20",
    "pydantic>=2.10",
    "croniter>=6.0",
    "click>=8.1",
    "argon2-cffi>=23.1",
    "fastapi>=0.115",
    # FastAPI's multipart/form-data parser. Required by the
    # ``/admin/personas/{id}/assets`` upload route (PLAN_PERSONA_STUDIO
    # W1). Without it FastAPI 400s any multipart request with
    # "Form data requires python-multipart" — silently in dev,
    # loudly in prod once a user tries to upload an emoji.
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.32",
    "websockets>=13",
    "httpx>=0.27",
    # PEP 440 ``Version`` comparator — used by the W1.1 update checker
    # to diff GitHub release tags (``v1.2.0``) against the installed
    # dist version (``1.1.1``). It is already transitively present
    # (uv, pip, hatchling, …) but we pin it explicitly because the
    # update checker has a hard import.
    "packaging>=24.0",
    "prometheus_client>=0.21",
    "watchdog>=5.0",
    # docker-py SDK — used by the one-click upgrader's DockerUpgrader
    # (W1.1 of docs/PLAN_ONE_CLICK_UPGRADE.md) to pull new gateway
    # images and recreate the container against the mounted
    # /var/run/docker.sock. Imported lazily inside method bodies so this
    # dep is not required at module import time, but is a hard
    # requirement for the docker runtime-mode upgrade path to work.
    "docker>=7.1.0",
    "anyio>=4",
    "corlinman-agent",
    "corlinman-providers",
    "corlinman-grpc",
    "corlinman-hooks",
    "corlinman-replay",
    "corlinman-channels",
    # corlinman-channels imports ``corlinman_identity`` unconditionally
    # (``corlinman_channels.common`` -> ``from corlinman_identity import
    # UserId``) but deliberately does not declare it (see that package's
    # pyproject NOTE). The gateway is the first real consumer of the
    # channels orchestration helpers (Parcel P3), so corlinman-server
    # carries the transitive dependency here.
    "corlinman-identity",
    # Automatic conversation memory: the agent servicer opens a
    # LocalSqliteHost for per-session recall/store, and routes/memory.py
    # exposes it over HTTP.
    "corlinman-memory-host",
    # Imported by the gateway runtime but previously undeclared — the
    # evolution applier (corlinman_auto_rollback / corlinman_evolution_store),
    # the canvas + MCP routes, and the skills admin surface.
    "corlinman-auto-rollback",
    "corlinman-evolution-store",
    "corlinman-canvas",
    "corlinman-mcp-server",
    "corlinman-skills-registry",
    "tomli-w>=1.2.0",
]

[project.optional-dependencies]
# Multi-gateway HA Postgres journal backend
# (``CORLINMAN_JOURNAL_BACKEND=postgres``). Off by default — installing
# the base package does not pull asyncpg, so single-process SQLite
# deployments stay slim.
postgres = ["asyncpg>=0.29,<1.0"]
# Tests for the Postgres backend skip cleanly when these extras are
# missing (see ``tests/test_agent_journal_postgres.py``). Bundled here
# so a developer working on the journal can ``uv sync --extra test`` and
# get a working live-Postgres integration test path.
test = [
    "asyncpg>=0.29,<1.0",
    "pytest-postgresql>=6.0",
]

[tool.uv.sources]
corlinman-agent = { workspace = true }
corlinman-providers = { workspace = true }
corlinman-grpc = { workspace = true }
corlinman-hooks = { workspace = true }
corlinman-replay = { workspace = true }
corlinman-channels = { workspace = true }
corlinman-identity = { workspace = true }
corlinman-memory-host = { workspace = true }
corlinman-auto-rollback = { workspace = true }
corlinman-evolution-store = { workspace = true }
corlinman-canvas = { workspace = true }
corlinman-mcp-server = { workspace = true }
corlinman-skills-registry = { workspace = true }

[project.scripts]
corlinman-python-server = "corlinman_server.main:main"
corlinman = "corlinman_server.cli.main:main"
corlinman-gateway = "corlinman_server.gateway.lifecycle.entrypoint:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_server"]
