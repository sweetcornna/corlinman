[project]
name = "corlinman-content-policy"
version = "0.1.0"
description = "Dependency-leaf deterministic content policy for Tencent-facing transports."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "corlinman contributors" }]

dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/corlinman_content_policy"]
